<!DOCTYPE html>
<html lang="javascriptreact">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Author Dashboard</title>
  <link rel="stylesheet" href="authorDashboard.css">
</head>

<body>
  <!-- navbar starts here -->
  <nav>
    <h2>Research Paper System</h2>
    <div class="logout-section">
      <p>Welcome, hassan!</p>
      <button>LOGOUT</button>
    </div>
  </nav>
  <!-- navbar ends here -->

  <!-- main section starts here -->
  <main>
    <div class="author-dashboard">
      <h1>Author Dashboard</h1>
      <p>Manage your research papers and submissions</p>
    </div>
    <div class="author-info-container">
      <div class="author-submit-paper-container">
        <div class="upper-line"></div>
        <i class="fa-solid fa-file"></i>
        <h1>Submit Paper</h1>
        <p>Upload and submit your research paper for review</p>
        <button class="submit-button">SUBMIT NEW PAPER</button>
      </div>
      <div class="author-view-paper-container">
        <i class="fa-solid fa-file"></i>
        <h1>Display My Papers</h1>
        <p>View all your submitted research papers</p>
        <button>VIEW MY PAPERS</button>
      </div>
    </div>
  </main>
  <footer>
    Developed by Hassan Raza
    <i class="fa-regular fa-copyright"></i>
    2026 Author Dashboard. All rights reserved.
  </footer>
  <script src="https://kit.fontawesome.com/1d8804d5ad.js" crossorigin="anonymous"></script>
</body>

</html>
